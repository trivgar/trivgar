/************************************************************/
/* OpenTable Functions                                      */
/*                                                          */
/* Define the tables look&feel for you whole site. For this */
/* we have two options: OpenTable and OpenTable2 functions. */
/* Then we have CloseTable and CloseTable2 function to      */
/* properly close our tables. The difference is that        */
/* OpenTable has a 100% width and OpenTable2 has a width    */
/* according with the table content                         */
/************************************************************/

function OpenTable() {
    global $bgcolor1, $bgcolor2;
    echo "&nbsp;<BR><table bgcolor=\"#344781\" border=\"0\" cellpadding=\"0\" cellspacing=\"0\" width=\"100%\">  <tr>    <td width=\"100%\">    <table border=\"0\" cellpadding=\"0\" cellspacing=\"0\" width=\"100%\">      <tr>        <td align=\"left\" width=\"*\" height=\"5\" background=\"themes/Hein_1/images/news_02.gif\"><img src=\"themes/Hein_1/images/news_01.gif\"></td>        <td align=\"right\" width=\"13\" height=\"5\" background=\"themes/Hein_1/images/news_02.gif\"><img src=\"themes/Hein_1/images/news_03.gif\"></td>      </tr>    </table>    </td>  </tr>  <tr>    <td width=\"100%\">    <table border=\"0\" cellpadding=\"0\" cellspacing=\"0\"  bordercolor=\"#111111\" width=\"100%\">      <tr>        <td width=\"5\" background=\"themes/Hein_1/images/news_05.gif\">&nbsp;</td>        <td>\n";
}

function CloseTable() {
    echo "		</td>        <td width=\"5\" background=\"themes/Hein_1/images/news_07.gif\">&nbsp;</td>      </tr>    </table>    </td>  </tr>  <tr>    <td width=\"100%\">    <table border=\"0\" cellpadding=\"0\" cellspacing=\"0\"  bordercolor=\"#111111\" width=\"100%\">      <tr>        <td align=\"left\" width=\"*\" height=\"5\" background=\"themes/Hein_1/images/news_11.gif\"><img src=\"themes/Hein_1/images/news_10.gif\"></td>        <td align=\"right\" width=\"13\" height=\"5\" background=\"themes/Hein_1/images/news_11.gif\"><img src=\"themes/Hein_1/images/news_12.gif\"></td>      </tr>    </table>    </td>  </tr></table>\n";
}
